services:
  - type: web
    name: makesweet-slack-bot
    runtime: docker
    plan: free
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: MAKESWEET_URL
        value: http://localhost:8080
      - key: SAVE_IMAGE_FOLDER
        value: /makesweet/images
      - key: GIN_MODE
        value: release
